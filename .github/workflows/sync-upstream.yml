name: Daily Upstream Sync

on:
  schedule:
    # 每天 UTC 06:00 (= 北京时间 14:00) 运行一次
    - cron: '0 6 * * *'
  workflow_dispatch:   # 也支持手动触发
  # 清理旧 sync PR 时的参考: 可加一个 label trigger
  # repository_dispatch:
  #   types: [sync-upstream]

jobs:
  sync-from-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork (main branch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/ZhuLinsen/daily_stock_analysis.git

      - name: Fetch upstream
        run: |
          git fetch upstream

      - name: Check if upstream has new commits
        id: check
        run: |
          LOCAL=$(git rev-parse @)
          UPSTREAM=$(git rev-parse upstream/main)
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "up_to_date=true" >> $GITHUB_OUTPUT
            echo "status=Upstream is up to date, nothing to sync." >> $GITHUB_OUTPUT
          else
            echo "up_to_date=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync & push (only when new commits exist)
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 优先 rebase，保持线性历史；若冲突则自动 abort，转为 merge
          git rebase upstream/main && \
            git push --force-with-lease origin main || {
              git rebase --abort
              git merge upstream/main
              git push origin main
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
